<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .logo-container {
      width: 500px;
      height: 500px;
      background: #111111;
      border-radius: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }
    .monogram {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 260px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -10px;
      padding-right: 10px; /* Balances the optical center of the D */
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <div class="monogram">D</div>
  </div>

</body>
</html>
