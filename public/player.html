<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>96.6 ROM Radio</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#fdeef3" />
<link rel="apple-touch-icon" href="/icon.png" />
<style>
  :root {
    --pink:#f4a9c0; --pink-soft:#f9d4e0; --red:#e63950; --red-deep:#cf2c45;
    --silver-1:#ffffff; --silver-2:#eef0f4; --silver-3:#e4e7ec; --edge:#cfd4dd;
    --ink:#42323a; --ink-dim:#a2949b; --glow:rgba(230,57,80,.22);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; min-height:100%; }
  body {
    min-height:100dvh;
    background:radial-gradient(120% 80% at 50% -10%, #fef8fa 0%, #fbeaf0 55%, #f6dfe8 100%);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:calc(20px + env(safe-area-inset-top)) 18px calc(20px + env(safe-area-inset-bottom));
  }

  .radio {
    width:min(440px,96vw);
    background:linear-gradient(180deg,#ffffff,#eaedf2);
    border:1px solid var(--edge); border-radius:20px; padding:22px 22px 26px;
    box-shadow:0 24px 60px rgba(150,120,135,.22), inset 0 1px 0 rgba(255,255,255,.9), inset 0 -2px 8px rgba(180,160,170,.12);
  }
  .brand { display:flex; align-items:baseline; gap:10px; }
  .brand .freq { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:clamp(28px,9vw,34px);
    font-weight:700; letter-spacing:1px; color:var(--red); text-shadow:0 1px 0 #fff, 0 0 14px rgba(230,57,80,.18); }
  .brand .name { font-size:13px; font-weight:700; letter-spacing:3px; color:var(--ink); opacity:.85; }
  .brand .name small { display:block; font-size:9px; letter-spacing:4px; opacity:.55; font-weight:600; }
  .brand .sig { margin-left:auto; display:flex; align-items:flex-end; gap:3px; height:16px; }
  .brand .sig i { width:3px; background:var(--red); border-radius:1px; box-shadow:0 0 5px rgba(230,57,80,.35); }
  .brand .sig i:nth-child(1){height:6px;opacity:.5;} .brand .sig i:nth-child(2){height:11px;opacity:.75;} .brand .sig i:nth-child(3){height:16px;}
  .tagline { margin:3px 0 16px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-dim); }

  .screen { position:relative; overflow:hidden; background:linear-gradient(180deg,#fff6f9,#fbeaf1);
    border:1px solid var(--edge); border-radius:12px; padding:14px 16px 16px;
    box-shadow:inset 0 2px 10px rgba(180,150,160,.18), 0 1px 0 rgba(255,255,255,.85); }
  .screen::after { content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.45), transparent 42%); }
  .nowlabel { display:flex; align-items:center; gap:8px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-dim); }
  .onair { margin-left:auto; font-size:9px; letter-spacing:1.5px; color:var(--red); border:1px solid var(--red);
    border-radius:4px; padding:1px 6px; opacity:0; transition:opacity .2s; }
  .onair.live { opacity:1; animation:blink 1.1s steps(1) infinite; }
  @keyframes blink { 50%{opacity:.3;} }
  .track { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:clamp(17px,5.5vw,20px);
    font-weight:600; color:var(--red-deep); text-shadow:0 1px 0 rgba(255,255,255,.6); margin:6px 0 2px;
    min-height:24px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bar { height:6px; background:#f0e3e8; border-radius:4px; margin:14px 0 6px; overflow:hidden; box-shadow:inset 0 1px 3px rgba(180,150,160,.25); }
  .fill { height:100%; width:0; background:linear-gradient(90deg,var(--pink),var(--red)); box-shadow:0 0 8px rgba(230,57,80,.3); transition:width .25s linear; }
  .time { display:flex; justify-content:space-between; font-size:11px; color:var(--ink-dim); font-variant-numeric:tabular-nums; font-family:ui-monospace,Menlo,monospace; }

  .controls { display:flex; align-items:center; gap:18px; margin-top:20px; }
  .power { flex:none; width:62px; height:62px; border-radius:50%; cursor:pointer; color:var(--red);
    background:radial-gradient(circle at 35% 28%, #ffffff, #e6e9ef); border:2px solid #d3d8e0;
    display:grid; place-items:center; font-size:20px; line-height:1;
    box-shadow:0 6px 14px rgba(150,120,135,.2), inset 0 1px 0 rgba(255,255,255,.9);
    transition:transform .08s, box-shadow .2s, border-color .2s; }
  .power::before { content:"\25B6"; transform:translateX(1px); }
  .power.on::before { content:"\275A\275A"; transform:none; letter-spacing:-1px; font-size:16px; }
  .power:active { transform:scale(.95); }
  .power.on { border-color:var(--red); box-shadow:0 0 18px rgba(230,57,80,.35), 0 6px 14px rgba(150,120,135,.2); }
  .vol { flex:1; display:flex; align-items:center; gap:10px; }
  .vol .volicon { font-size:10px; letter-spacing:2px; color:var(--ink-dim); }
  .vol input[type=range]{ flex:1; -webkit-appearance:none; appearance:none; height:6px; border-radius:4px;
    background:linear-gradient(90deg,var(--pink),#e4e7ec); box-shadow:inset 0 1px 3px rgba(180,150,160,.25); }
  .vol input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ffffff,#f6c6d6); border:1px solid #d3d8e0;
    box-shadow:0 1px 4px rgba(150,120,135,.3),0 0 7px rgba(230,57,80,.25); cursor:pointer; }
  .vol input[type=range]::-moz-range-thumb{ width:20px; height:20px; border:none; border-radius:50%;
    background:var(--pink); box-shadow:0 0 7px rgba(230,57,80,.25); }

  .shows { margin-top:22px; }
  .shows h3 { margin:0 0 8px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-dim); }
  #showlist { max-height:min(46vh,320px); overflow-y:auto; -webkit-overflow-scrolling:touch; padding-right:4px; }
  #showlist::-webkit-scrollbar{ width:5px; }
  #showlist::-webkit-scrollbar-thumb{ background:#dcd2d7; border-radius:3px; }
  .show { display:flex; align-items:center; gap:12px; padding:11px 12px; margin-bottom:7px; border-radius:11px;
    cursor:pointer; background:linear-gradient(180deg,#ffffff,#f5f6f9); border:1px solid #e4e7ec;
    transition:border-color .15s, background .15s, transform .08s; }
  .show:hover { background:#fdf1f5; }
  .show:active { transform:scale(.99); }
  .show.active { border-color:var(--red); background:#fdeef3; box-shadow:0 0 0 1px rgba(230,57,80,.18), inset 0 0 18px rgba(244,169,192,.18); }
  .show .num { font-family:ui-monospace,Menlo,monospace; font-size:13px; color:var(--ink-dim); width:22px; text-align:center; }
  .show.active .num { color:var(--red); }
  .show .info { display:flex; flex-direction:column; gap:2px; min-width:0; flex:1; }
  .show .t { font-size:14px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .show .meta { font-size:11px; color:var(--ink-dim); }
  .show .eq { display:flex; align-items:flex-end; gap:2px; height:16px; width:18px; opacity:.3; }
  .show .eq i { flex:1; background:var(--red); border-radius:1px; height:20%; }
  .show.active .eq { opacity:1; }
  .show.active .eq i { animation:eq .9s ease-in-out infinite; box-shadow:0 0 5px rgba(230,57,80,.4); }
  .show.active .eq i:nth-child(2){ animation-delay:.15s; } .show.active .eq i:nth-child(3){ animation-delay:.3s; } .show.active .eq i:nth-child(4){ animation-delay:.45s; }
  @keyframes eq { 0%,100%{height:25%;} 50%{height:100%;} }
  .empty { font-size:12px; color:var(--ink-dim); line-height:1.55; }
  .empty code { background:#fdeef3; padding:1px 5px; border-radius:4px; color:var(--red-deep); }

  #gate { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; padding:24px;
    background:radial-gradient(120% 80% at 50% -10%, #fef8fa, #f6dfe8 70%); transition:opacity .55s ease; }
  #gate.fade-out { opacity:0; }
  #gate-inner { text-align:center; max-width:340px; width:100%; }
  .gate-dial { width:64px; height:64px; margin:0 auto 22px; border-radius:50%; position:relative;
    background:radial-gradient(circle at 35% 30%, #ffffff, #e9ecf1); border:2px solid #d3d8e0;
    box-shadow:0 0 26px rgba(230,57,80,.18), inset 0 1px 0 rgba(255,255,255,.9); animation:pulse 2.4s ease-in-out infinite; }
  .gate-dial::after { content:""; position:absolute; top:8px; left:50%; width:2px; height:22px; background:var(--red);
    border-radius:1px; transform:translateX(-50%); box-shadow:0 0 6px rgba(230,57,80,.45); }
  @keyframes pulse { 50%{ box-shadow:0 0 34px rgba(230,57,80,.32), inset 0 1px 0 rgba(255,255,255,.9);} }
  .gate-title { margin:0; font-family:ui-monospace,Menlo,monospace; font-size:40px; font-weight:700; letter-spacing:2px;
    color:var(--red); text-shadow:0 1px 0 #fff, 0 0 16px rgba(230,57,80,.18); }
  .gate-title span { font-size:18px; opacity:.55; margin-left:6px; }
  .gate-sub, .gate-tagline { color:var(--ink-dim); font-size:11px; letter-spacing:2px; text-transform:uppercase; }
  .gate-sub { margin:6px 0 0; }
  #gate-form { margin-top:36px; display:flex; flex-direction:column; gap:14px; align-items:center; }
  #gate-input { width:230px; background:#fff; border:1px solid var(--edge); border-radius:10px; color:var(--red-deep);
    font-size:16px; padding:13px 16px; text-align:center; letter-spacing:1px; outline:none; box-shadow:inset 0 1px 4px rgba(180,150,160,.2); }
  #gate-input:focus { border-color:var(--red); box-shadow:inset 0 1px 4px rgba(180,150,160,.2), 0 0 12px rgba(230,57,80,.25); }
  #gate-btn { background:linear-gradient(180deg,#ffffff,#eef0f4); border:1px solid #d3d8e0; border-radius:10px;
    color:var(--red); font-size:12px; font-weight:700; letter-spacing:2px; padding:12px 26px; cursor:pointer;
    transition:transform .08s, box-shadow .2s, border-color .2s; }
  #gate-btn:hover { border-color:var(--red); box-shadow:0 0 16px rgba(230,57,80,.28); }
  #gate-btn:active { transform:scale(.96); }
  #gate-welcome { margin-top:30px; display:flex; flex-direction:column; gap:14px; color:var(--red); font-size:22px;
    letter-spacing:1px; text-shadow:0 1px 0 #fff; }
  @keyframes gate-shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-8px);} 40%,80%{transform:translateX(8px);} }
  .shake { animation:gate-shake .4s ease; }
</style>
</head>
<body>
  <div id="gate">
    <div id="gate-inner">
      <div class="gate-dial" aria-hidden="true"></div>
      <h1 class="gate-title">96.6<span>FM</span></h1>
      <p class="gate-sub">ROM Radio · Victoria's station for love</p>
      <div id="gate-form">
        <input id="gate-input" type="text" placeholder="your name…" autocomplete="off" spellcheck="false" aria-label="Enter your name to tune in">
        <button id="gate-btn" type="button">▶ TUNE IN</button>
      </div>
      <p id="gate-welcome" hidden>
        Welcome, Pauline ♥
        <span class="gate-tagline">Victoria's station for love</span>
      </p>
    </div>
  </div>

  <main class="radio">
    <header class="brand">
      <span class="freq">96.6</span>
      <span class="name">ROM<small>RADIO</small></span>
      <span class="sig" aria-hidden="true"><i></i><i></i><i></i></span>
    </header>
    <p class="tagline">Victoria's station for love</p>

    <section class="screen" aria-live="polite">
      <div class="nowlabel">Now Playing <span class="onair" id="onair">● ON AIR</span></div>
      <div class="track" id="track">— select a show —</div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="time"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    </section>

    <div class="controls">
      <button class="power" id="power" type="button" aria-label="Play or pause"></button>
      <label class="vol"><span class="volicon">VOL</span>
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.85" aria-label="Volume" /></label>
    </div>

    <section class="shows">
      <h3>Shows</h3>
      <div id="showlist"><div class="empty">Loading…</div></div>
    </section>
  </main>

  <audio id="audio" preload="metadata"></audio>

  <!-- Inlined show data (written by build_shows.py). Lets this page work when
       opened directly from disk in Safari, where fetch() is blocked. Harmless
       if missing — the script then fetches the manifest instead. -->
  <script src="shows/data.js" onerror="window.__noData=true"></script>

<script>
  const audio = document.getElementById("audio");
  const powerBtn = document.getElementById("power");
  const trackEl = document.getElementById("track");
  const fill = document.getElementById("fill");
  const curEl = document.getElementById("cur");
  const durEl = document.getElementById("dur");
  const onair = document.getElementById("onair");
  const vol = document.getElementById("vol");
  const showlist = document.getElementById("showlist");

  let cue = null;       // current show's cue sheet
  let activeId = null;

  const fmt = (s) => {
    if (!isFinite(s)) return "0:00";
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ":" + String(sec).padStart(2, "0");
  };
  const prettyTitle = (raw) => {
    // "Ivy by Frank Ocean" -> "Ivy — Frank Ocean"
    const m = raw.match(/^(.*?) by (.*)$/i);
    return m ? `${m[1]} — ${m[2]}` : raw;
  };
  const currentTitle = (t) => {
    if (!cue || !cue.tracks.length) return "";
    let title = cue.tracks[0].title;
    for (const tr of cue.tracks) if (t >= tr.start) title = tr.title;
    return prettyTitle(title);
  };
  const djLive = (t) =>
    !!cue && (cue.djWindows || []).some(([a, b]) => t >= a && t <= b);

  async function loadShow(show) {
    if (!show.rendered) return;
    activeId = show.id;
    document.querySelectorAll(".show").forEach((el) =>
      el.classList.toggle("active", +el.dataset.id === show.id));
    // inlined cue (file://) first, else fetch (served)
    const inlined = window.SHOWS_DATA && window.SHOWS_DATA.cues
      ? window.SHOWS_DATA.cues[String(show.id)] : null;
    if (inlined) {
      cue = inlined;
    } else {
      try { cue = await (await fetch(show.cue)).json(); } catch { cue = null; }
    }
    audio.src = show.file;
    durEl.textContent = cue ? fmt(cue.duration) : "0:00";
    trackEl.textContent = "— ready —";
    fill.style.width = "0%"; curEl.textContent = "0:00";
    audio.volume = parseFloat(vol.value);
    audio.play()
      .then(() => powerBtn.classList.add("on"))
      .catch(() => powerBtn.classList.remove("on"));
  }

  function renderList(shows) {
    if (!shows.length) {
      showlist.innerHTML =
        '<div class="empty">No shows yet. Run <code>python3 scripts/build_shows.py --all</code> to generate them into public/shows/.</div>';
      return;
    }
    showlist.innerHTML = "";
    for (const s of shows) {
      const div = document.createElement("div");
      div.className = "show";
      div.dataset.id = s.id;
      div.innerHTML =
        `<span class="num">${String(s.id + 1).padStart(2, "0")}</span>` +
        `<span class="info"><span class="t">${s.title}</span>` +
        `<span class="meta">${s.tracks} tracks</span></span>` +
        `<span class="eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>`;
      div.addEventListener("click", () => loadShow(s));
      showlist.appendChild(div);
    }
  }

  powerBtn.addEventListener("click", () => {
    if (!audio.src) return;
    if (audio.paused) { audio.play().catch(() => {}); powerBtn.classList.add("on"); }
    else { audio.pause(); powerBtn.classList.remove("on"); }
  });
  vol.addEventListener("input", () => { audio.volume = parseFloat(vol.value); });

  audio.addEventListener("timeupdate", () => {
    const t = audio.currentTime;
    fill.style.width = (t / (audio.duration || (cue && cue.duration) || 1)) * 100 + "%";
    curEl.textContent = fmt(t);
    trackEl.textContent = currentTitle(t) || "— playing —";
    onair.classList.toggle("live", djLive(t));
  });
  audio.addEventListener("pause", () => powerBtn.classList.remove("on"));
  audio.addEventListener("play", () => powerBtn.classList.add("on"));
  audio.addEventListener("ended", () => {
    // roll into the next rendered show, radio-style
    if (window._shows) {
      const idx = window._shows.findIndex((s) => s.id === activeId);
      const next = window._shows.slice(idx + 1).find((s) => s.rendered)
                || window._shows.find((s) => s.rendered);
      if (next && next.id !== activeId) return loadShow(next);
    }
    powerBtn.classList.remove("on");
    trackEl.textContent = "— end of show —";
    onair.classList.remove("live");
  });

  (async function init() {
    // Prefer inlined data (works from file:// in Safari); fall back to fetch.
    if (window.SHOWS_DATA && Array.isArray(window.SHOWS_DATA.shows)) {
      window._shows = window.SHOWS_DATA.shows;
      renderList(window._shows.filter(s => s.rendered));
      return;
    }
    try {
      const data = await (await fetch("shows/manifest.json")).json();
      window._shows = data.shows || [];
      renderList(window._shows.filter(s => s.rendered));
    } catch {
      showlist.innerHTML =
        '<div class="empty">No show data found. Run <code>python3 scripts/build_shows.py --all</code> to generate the shows, then reopen this page.</div>';
    }
  })();
</script>
<script>
(function () {
  var gate = document.getElementById('gate');
  if (!gate) return;

  // Return visitor — skip gate entirely
  if (localStorage.getItem('rom_unlocked') === '1') {
    gate.remove();
    return;
  }

  var input = document.getElementById('gate-input');
  var btn = document.getElementById('gate-btn');
  var form = document.getElementById('gate-form');
  var welcome = document.getElementById('gate-welcome');

  function tryUnlock() {
    if (input.value.trim().toLowerCase() !== 'pauline') {
      input.classList.remove('shake');
      void input.offsetWidth; // force reflow so animation re-triggers
      input.classList.add('shake');
      input.value = '';
      input.addEventListener('animationend', function () {
        input.classList.remove('shake');
      }, { once: true });
      return;
    }
    form.hidden = true;
    welcome.hidden = false;
    setTimeout(function () {
      gate.classList.add('fade-out');
      gate.addEventListener('transitionend', function () {
        gate.remove();
        localStorage.setItem('rom_unlocked', '1');
      }, { once: true });
    }, 2000);
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryUnlock();
  });
  input.focus();
})();
</script>
<script>
  // Register the service worker so the player works offline (cache-on-play).
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () =>
      navigator.serviceWorker.register("/sw.js").catch(() => {}));
  }
</script>
</body>
</html>
